<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contactplatform Attila Nagy</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #fff;
    }
    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }
    header {
      border-bottom: 1px solid rgba(0,123,255,0.2);
      padding: 15px 0;
    }
    h1 {
      margin: 0;
    }
    .hero {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
      margin-top: 40px;
    }
    .hero img {
      width: 120px;
      height: 120px;
      border-radius: 20px;
      border: 2px solid #1e90ff;
      object-fit: cover;
    }
    .card {
      border: 1px solid rgba(0,123,255,0.2);
      padding: 15px;
      border-radius: 15px;
      margin-top: 20px;
    }
    button {
      background: #1e90ff;
      color: #fff;
      border: none;
      padding: 10px 15px;
      border-radius: 10px;
      cursor: pointer;
    }
    input, textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(0,123,255,0.2);
      background: #111;
      color: #fff;
      box-sizing: border-box;
    }
    label {
      display: block;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <header class="container">
    <h1>Contactplatform Attila István Nagy</h1>
  </header>

  <div class="container">
    <div class="hero">
      <img src="Profielfoto eigen Website.jpg" alt="Profielfoto" />
      <div>
        <h2>Attila István Nagy</h2>
        <p>Dit platform biedt ruimte voor communicatie onder eigen regie. Toegang en invulling worden zorgvuldig bepaald. Verdere ontwikkeling volgt.</p>
      </div>
    </div>

    <div class="card">
  <h3>Updates</h3>
  <p><b>Laatste update</b> – Platform operationeel. Communicatie verloopt via dit kanaal.</p>
</div>
    <div class="card">
    
  <h3>Contact</h3>

  <form action="https://formspree.io/f/xpqojggj" method="POST">
    <input type="text" name="naam" placeholder="Naam" required />
    <input type="email" name="email" placeholder="E-mail" required />
    <textarea name="bericht" placeholder="Bericht" required></textarea>

    <label>Wat is 1 + 1?</label>
    <input type="text" name="antwoord" placeholder="Antwoord" required />

    <button type="submit">Verzenden</button>
  </form>
</div> 

       
  </div>
</body>
</html>
